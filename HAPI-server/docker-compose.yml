services:
  hapi:
    image: hapiproject/hapi:v8.8.0-1
    container_name: hapi-medicalalertinformation
    restart: unless-stopped
    ports:
      - "${HAPI_PORT:-8080}:8080"
    environment:
      SPRING_CONFIG_LOCATION: file:///hapi/config/application.yaml
    volumes:
      - ./config/application.yaml:/hapi/config/application.yaml:ro
      - ./ig:/hapi/ig:ro
      - hapi-h2:/data/hapi
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/fhir/metadata >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  hapi-h2:
