spring:
  main:
    allow-circular-references: true
  # Without Elasticsearch/OpenSearch in docker-compose, Spring Boot 3.5+ would
  # still auto-configure the REST client and the Sniffer polls localhost:9200
  # (Connection refused spam in logs). Same pattern as hapi-fhir-jpaserver-starter
  # for H2-only / Lucene demos — see application.yaml there under spring.autoconfigure.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ReactiveElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration
  flyway:
    enabled: false
    baselineOnMigrate: true
    fail-on-missing-locations: false
  datasource:
    url: 'jdbc:h2:mem:hapi;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE,OFFSET'
    username: sa
    password: null
    driverClassName: org.h2.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    properties:
      hibernate.format_sql: false
      hibernate.show_sql: false
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect
      hibernate.search.enabled: false

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: 'health,info'

hapi:
  fhir:
    fhir_version: R4
    server_address: 'http://localhost:8080/fhir'
    default_pretty_print: true
    default_encoding: json
    default_page_size: 50
    max_page_size: 500

    # Validation set to "warn" by request: server accepts non-conforming
    # resources but reports issues in OperationOutcome.
    validation:
      requests_enabled: false
      responses_enabled: false

    # NB: HAPI's 'implementationguides:' block is fussy about local
    # file:// URLs and has caused HAPI-1301 ("Unable to locate package")
    # when the path is mounted into the container. The recommended way
    # to load profiles into the demo server is the REST-based loader:
    #
    #   ./scripts/build-ig.sh --sushi   # produce ig/*.tgz
    #   ./scripts/load-ig.sh            # PUT each profile into the server
    #
    # That sidesteps the npm package installer entirely and works
    # regardless of HAPI starter version.

    # Convenience features useful at the hackathon.
    cors:
      allow_credentials: false
      allowed_origin:
        - '*'
      allowed_headers:
        - 'X-FHIR-Starter'
        - 'Origin'
        - 'Accept'
        - 'X-Requested-With'
        - 'Content-Type'
        - 'Access-Control-Request-Method'
        - 'Access-Control-Request-Headers'
        - 'Cache-Control'
        - 'Prefer'

    # Subscriptions disabled to keep the demo simple. (Don't add an
    # 'email:' subkey here unless you also set email.host — HAPI 8.x
    # eagerly instantiates the SMTP sender and fails to start without
    # a host.)
    subscription:
      resthook_enabled: false
      websocket_enabled: false

    # Useful operations and search behavior.
    fhirpath_interceptor_enabled: false
    expunge_enabled: true
    delete_expunge_enabled: true
    allow_multiple_delete: true
    allow_external_references: true
    allow_placeholder_references: true
    auto_create_placeholder_reference_targets: false
    enable_index_missing_fields: false
